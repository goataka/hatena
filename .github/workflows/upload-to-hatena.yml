name: Upload to Hatena Blog

on:
  push:
    branches:
      - main
    paths:
      - 'articles/**/*.md'

jobs:
  upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Upload articles to Hatena Blog
        env:
          HATENA_ID: ${{ secrets.HATENA_ID }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
          HATENA_API_KEY: ${{ secrets.HATENA_API_KEY }}
        run: |
          # Get the list of changed markdown files in articles directory
          changed_files=$(git diff --name-only HEAD^ HEAD | grep '^articles/.*\.md$' || true)
          
          if [ -z "$changed_files" ]; then
            echo "No article files changed"
            exit 0
          fi
          
          echo "Changed articles:"
          echo "$changed_files"
          
          # Upload each changed article
          for file in $changed_files; do
            if [ -f "$file" ]; then
              echo "Uploading $file..."
              node scripts/upload-to-hatena.js "$file"
            else
              echo "File $file was deleted, skipping"
            fi
          done
